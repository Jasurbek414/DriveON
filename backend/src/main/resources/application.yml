server:
  port: 8080

spring:
  application:
    name: driveon-backend

  # H2 for development, PostgreSQL for production
  datasource:
    url: jdbc:postgresql://localhost:5432/driveon
    driver-class-name: org.postgresql.Driver
    username: driveon
    password: driveon123

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  jackson:
    serialization:
      write-dates-as-timestamps: false
    default-property-inclusion: non_null

# JWT Configuration
app:
  jwt:
    secret: DriveON_S3cur3_JWT_S3cr3t_K3y_2026_Pr0f3ss10nal_Gr4d3_App!
    expiration-ms: 86400000       # 24 hours
    refresh-expiration-ms: 604800000  # 7 days

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

# Logging
logging:
  level:
    com.driveon: DEBUG
    org.springframework.security: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

---
# Production Profile
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:postgresql://localhost:5432/driveon
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:driveon}
    password: ${DB_PASSWORD:driveon123}

  h2:
    console:
      enabled: false

  jpa:
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: false
